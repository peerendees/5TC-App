<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5-Tage-Challenge Buch App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/docx@9.5.0/build/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <style>
    :root {
      --bg: #0e0e10;
      --bg2: #151518;
      --bg3: #1c1c20;
      --border: #2a2a2e;
      --border2: #3a3a40;
      --copper: #B5742A;
      --copper-lt: #cc8c3e;
      --copper-dk: #7a4e1c;
      --gold: #E8C98A;
      --gold-dim: #c4a870;
      --text: #C4BCB1;
      --text-muted: #7a6a58;
      --muted2: #9a8870;
      --danger: #C0392B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Lora', Georgia, serif;
      font-weight: 400;
      line-height: 1.7;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Grain Overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Glow Orb */
    body::after {
      content: '';
      position: fixed;
      top: 20%;
      left: 50%;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(181, 116, 42, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: orbDrift 20s infinite alternate ease-in-out;
    }

    @keyframes orbDrift {
      from { transform: translate(-50%, 0); }
      to { transform: translate(-50%, -80px) translateX(60px); }
    }

    header {
      background: var(--bg2);
      border-bottom: 2px solid var(--copper);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      z-index: 1;
    }

    header .plus {
      font-size: 2.5rem;
      color: var(--gold);
      font-weight: 300;
      line-height: 1;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header h1 span {
      color: var(--copper);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--copper);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .section-title::before {
      content: '+';
      color: var(--gold);
      font-size: 1.2rem;
      font-weight: 300;
    }

    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.35rem;
      margin-top: 0.75rem;
    }

    label:first-of-type { margin-top: 0; }

    input[type="text"], input[type="password"], textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Lora', Georgia, serif;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--copper);
    }

    textarea { resize: vertical; min-height: 120px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: var(--copper);
      color: #fff;
    }

    .btn-primary:hover { background: var(--copper-lt); }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border2);
    }

    .btn-secondary:hover { border-color: var(--copper); color: var(--copper); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 0.4rem 0.7rem;
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-danger:hover { background: rgba(192, 57, 43, 0.15); }

    /* Drop Zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 1rem;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--copper);
      background: rgba(181, 116, 42, 0.04);
    }

    .drop-zone p {
      color: var(--text-muted);
      font-family: 'Lora', serif;
      font-size: 0.9rem;
    }

    .drop-zone .icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--gold);
    }

    .drop-zone input[type="file"] { display: none; }

    /* Chapter Cards */
    .chapter-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .chapter-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      cursor: grab;
      transition: border-color 0.3s;
    }

    .chapter-card:hover { border-color: var(--border2); }
    .chapter-card:active { cursor: grabbing; }
    .chapter-card.dragging { opacity: 0.5; border-color: var(--copper); }

    .chapter-card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .chapter-number {
      background: var(--copper);
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    .chapter-title-input {
      flex: 1;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
    }

    .chapter-title-input:focus {
      outline: none;
      border-color: var(--copper);
      background: var(--bg2);
    }

    .chapter-preview {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
      max-height: 3.5em;
      overflow: hidden;
      margin-left: 40px;
    }

    .chapter-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      margin-left: 40px;
    }

    .chapter-meta span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .chapter-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-weight: 500;
    }

    .status-pending { background: var(--bg); color: var(--text-muted); }
    .status-processing { background: rgba(181, 116, 42, 0.2); color: var(--copper-lt); }
    .status-done { background: rgba(39, 174, 96, 0.2); color: #27AE60; }
    .status-error { background: rgba(192, 57, 43, 0.2); color: var(--danger); }

    /* Add Text Area */
    .add-text-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .add-text-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .add-text-row textarea {
      flex: 1;
      min-height: 80px;
    }

    /* Progress */
    .progress-bar-container {
      background: var(--bg);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      margin: 1rem 0;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--copper), var(--gold));
      border-radius: 999px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-text {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    /* Generated Content Preview */
    .preview-toggle {
      background: none;
      border: none;
      color: var(--copper);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      padding: 0;
      transition: color 0.3s;
    }

    .preview-toggle:hover { color: var(--copper-lt); }

    .preview-content {
      display: none;
      margin-top: 0.75rem;
      margin-left: 40px;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Lora', serif;
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .preview-content.open { display: block; }

    /* Actions */
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-family: 'Lora', serif;
      font-style: italic;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 900;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--copper);
      border-radius: 12px;
      padding: 1.5rem;
      width: 360px;
      max-width: 90vw;
    }

    .modal h3 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--copper);
      font-size: 1.2rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal h3::before {
      content: '+';
      color: var(--gold);
      font-weight: 300;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.85rem 1.2rem;
      border-radius: 10px;
      font-size: 0.9rem;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }

    .toast-error { background: var(--danger); color: #fff; }
    .toast-success { background: #27AE60; color: #fff; }

    @keyframes slideIn {
      from { transform: translateY(1rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      header { padding: 1rem; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="plus">+</div>
  <h1>5-Tage-Challenge <span>Buch App</span></h1>
</header>

<div class="container">

  <!-- API Key -->
  <div class="section">
    <div class="section-title">API-Konfiguration</div>
    <label for="apiKey">Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  </div>

  <!-- Book Meta -->
  <div class="section">
    <div class="section-title">Buchinformationen</div>
    <label for="bookTitle">Buchtitel</label>
    <input type="text" id="bookTitle" placeholder="Dein Buchtitel">
    <div class="row">
      <div>
        <label for="bookSubtitle">Untertitel</label>
        <input type="text" id="bookSubtitle" placeholder="Optional">
      </div>
      <div>
        <label for="bookAuthor">Autor</label>
        <input type="text" id="bookAuthor" placeholder="Vorname Nachname">
      </div>
    </div>
  </div>

  <!-- Upload -->
  <div class="section">
    <div class="section-title">Transkripte hochladen</div>

    <div class="drop-zone" id="dropZone">
      <div class="icon">+</div>
      <p>Dateien hierher ziehen oder klicken zum Auswählen</p>
      <p style="font-size: 0.75rem; margin-top: 0.25rem; color: var(--border);">.txt, .md, .docx</p>
      <input type="file" id="fileInput" multiple accept=".txt,.md,.docx">
    </div>

    <div class="add-text-section">
      <label for="pasteText">Oder Text direkt einfügen:</label>
      <div class="add-text-row">
        <textarea id="pasteText" placeholder="Transkript hier einfügen..."></textarea>
        <button class="btn btn-secondary" onclick="addPastedText()" style="align-self: flex-end;">Hinzufügen</button>
      </div>
    </div>
  </div>

  <!-- Chapters -->
  <div class="section">
    <div class="section-title">Kapitel</div>
    <div id="chapterList" class="chapter-list">
      <div class="empty-state">Noch keine Transkripte hinzugefügt.</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="section" id="progressSection" style="display:none;">
    <div class="section-title">Fortschritt</div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">Bereit</div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="generateBtn" onclick="showPasswordModal()">Buch generieren</button>
    <button class="btn btn-primary" id="downloadBtn" onclick="downloadDocx()" style="display:none;">Buch herunterladen</button>
    <button class="btn btn-secondary" id="resetBtn" onclick="resetApp()" style="display:none;">Eingaben zurücksetzen</button>
  </div>

</div>

<script>
// ── State ──
let chapters = [];
let draggedIndex = null;

// ── File Upload ──
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', async (e) => {
  const fileArray = Array.from(e.target.files);
  fileInput.value = '';
  await handleFiles(fileArray);
});

async function handleFiles(files) {
  for (const file of files) {
    const ext = file.name.split('.').pop().toLowerCase();
    let text = '';

    if (ext === 'docx') {
      try {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer });
        text = result.value;
      } catch (err) {
        showToast('Fehler beim Lesen von ' + file.name, 'error');
        continue;
      }
    } else {
      text = await file.text();
    }

    const title = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
    addChapter(title, text);
  }
}

function addPastedText() {
  const textarea = document.getElementById('pasteText');
  const text = textarea.value.trim();
  if (!text) return;

  const num = chapters.length + 1;
  addChapter('Kapitel ' + num, text);
  textarea.value = '';
}

function addChapter(title, text) {
  chapters.push({
    title,
    transcript: text,
    generated: null,
    status: 'pending'
  });
  renderChapters();
}

// ── Render Chapters ──
function renderChapters() {
  const list = document.getElementById('chapterList');

  if (chapters.length === 0) {
    list.innerHTML = '<div class="empty-state">Noch keine Transkripte hinzugefügt.</div>';
    return;
  }

  list.innerHTML = chapters.map((ch, i) => {
    const wordCount = ch.transcript.split(/\s+/).length;
    const preview = ch.transcript.substring(0, 150).replace(/</g, '&lt;') + (ch.transcript.length > 150 ? '...' : '');
    const statusClass = 'status-' + ch.status;
    const statusLabel = { pending: 'Ausstehend', processing: 'Wird verarbeitet...', done: 'Fertig', error: 'Fehler' }[ch.status];

    return `
      <div class="chapter-card" draggable="true" data-index="${i}"
           ondragstart="onDragStart(event, ${i})"
           ondragover="onDragOver(event)"
           ondrop="onDrop(event, ${i})"
           ondragend="onDragEnd(event)">
        <div class="chapter-card-header">
          <div class="chapter-number">${i + 1}</div>
          <input class="chapter-title-input" value="${ch.title.replace(/"/g, '&quot;')}"
                 onchange="chapters[${i}].title = this.value">
          <button class="btn-danger" onclick="removeChapter(${i})">Entfernen</button>
        </div>
        <div class="chapter-preview">${preview}</div>
        <div class="chapter-meta">
          <span>${wordCount.toLocaleString('de-DE')} Wörter</span>
          <span class="chapter-status ${statusClass}">${statusLabel}</span>
        </div>
        ${ch.generated ? `
          <div class="chapter-meta" style="margin-top: 0.25rem;">
            <button class="preview-toggle" onclick="togglePreview(${i})">Vorschau anzeigen/ausblenden</button>
          </div>
          <div class="preview-content" id="preview-${i}">${ch.generated.replace(/</g, '&lt;').substring(0, 2000)}${ch.generated.length > 2000 ? '\n\n... (gekürzt)' : ''}</div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function removeChapter(index) {
  chapters.splice(index, 1);
  renderChapters();
}

function togglePreview(index) {
  const el = document.getElementById('preview-' + index);
  if (el) el.classList.toggle('open');
}

// ── Drag & Drop Reorder ──
function onDragStart(e, index) {
  draggedIndex = index;
  e.currentTarget.classList.add('dragging');
}

function onDragOver(e) {
  e.preventDefault();
}

function onDrop(e, targetIndex) {
  e.preventDefault();
  if (draggedIndex === null || draggedIndex === targetIndex) return;
  const item = chapters.splice(draggedIndex, 1)[0];
  chapters.splice(targetIndex, 0, item);
  draggedIndex = null;
  renderChapters();
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  draggedIndex = null;
}

// ── Password Modal ──
function showPasswordModal() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const bookTitle = document.getElementById('bookTitle').value.trim();

  if (!apiKey) { showToast('Bitte API Key eingeben.', 'error'); return; }
  if (chapters.length === 0) { showToast('Bitte mindestens ein Transkript hinzufügen.', 'error'); return; }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Zugangskennwort</h3>
      <label style="margin-top:0;">Bitte Kennwort eingeben:</label>
      <input type="password" id="modalPassword" placeholder="Kennwort..." autofocus>
      <div class="modal-actions">
        <button class="btn btn-primary" id="modalConfirm">Generieren</button>
        <button class="btn btn-secondary" id="modalCancel">Abbrechen</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const pwInput = document.getElementById('modalPassword');
  const confirmBtn = document.getElementById('modalConfirm');
  const cancelBtn = document.getElementById('modalCancel');

  function closeModal() { overlay.remove(); }

  function checkAndProceed() {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('de-DE', {
      timeZone: 'Europe/Berlin',
      day: '2-digit',
      hour: '2-digit',
      hourCycle: 'h23'
    }).formatToParts(now);
    const dd = parts.find(p => p.type === 'day').value.padStart(2, '0');
    const hh = parts.find(p => p.type === 'hour').value.padStart(2, '0');
    const expectedPw = '8Lp!n3#' + dd + hh;

    if (pwInput.value === expectedPw) {
      closeModal();
      generateBook();
    } else {
      showToast('Falsches Kennwort.', 'error');
      pwInput.value = '';
      pwInput.focus();
    }
  }

  confirmBtn.addEventListener('click', checkAndProceed);
  cancelBtn.addEventListener('click', closeModal);
  pwInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkAndProceed();
    if (e.key === 'Escape') closeModal();
  });

  setTimeout(() => pwInput.focus(), 50);
}

// ── Generate Book ──
async function generateBook() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const bookTitle = document.getElementById('bookTitle').value.trim();

  if (!apiKey) { showToast('Bitte API Key eingeben.', 'error'); return; }
  if (chapters.length === 0) { showToast('Bitte mindestens ein Transkript hinzufügen.', 'error'); return; }

  const generateBtn = document.getElementById('generateBtn');
  const progressSection = document.getElementById('progressSection');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  generateBtn.disabled = true;
  progressSection.style.display = 'block';

  for (let i = 0; i < chapters.length; i++) {
    chapters[i].status = 'processing';
    renderChapters();
    progressBar.style.width = ((i / chapters.length) * 100) + '%';
    progressText.textContent = `Kapitel ${i + 1} von ${chapters.length} wird verarbeitet...`;

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 120000);

      const response = await fetch('/api/generate-chapter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: controller.signal,
        body: JSON.stringify({
          apiKey,
          transcript: chapters[i].transcript,
          chapterTitle: chapters[i].title,
          bookTitle: bookTitle || 'Ohne Titel',
          chapterNumber: i + 1
        })
      });

      clearTimeout(timeout);

      if (!response.ok) {
        let errMsg = `HTTP ${response.status}`;
        try {
          const err = await response.json();
          errMsg = err.error || errMsg;
        } catch (_) {}
        throw new Error(errMsg);
      }

      const data = await response.json();
      chapters[i].generated = data.content;
      chapters[i].status = 'done';
    } catch (err) {
      chapters[i].status = 'error';
      chapters[i].generated = null;
      const msg = err.name === 'AbortError'
        ? 'Zeitüberschreitung (2 Min.) - Transkript evtl. zu lang'
        : err.message;
      showToast(`Fehler bei Kapitel ${i + 1}: ${msg}`, 'error');
    }

    renderChapters();
  }

  progressBar.style.width = '100%';
  progressText.textContent = 'Alle Kapitel verarbeitet!';

  const successCount = chapters.filter(c => c.status === 'done').length;
  if (successCount > 0) {
    document.getElementById('downloadBtn').style.display = '';
    showToast(`${successCount} Kapitel erfolgreich generiert!`, 'success');
  }

  // Generieren bleibt deaktiviert, Reset wird sichtbar
  generateBtn.disabled = true;
  document.getElementById('resetBtn').style.display = '';
}

// ── DOCX Generation ──
async function downloadDocx() {
  try {
  const bookTitle = document.getElementById('bookTitle').value.trim() || 'Mein Buch';
  const bookSubtitle = document.getElementById('bookSubtitle').value.trim();
  const bookAuthor = document.getElementById('bookAuthor').value.trim();

  const doneChapters = chapters.filter(c => c.status === 'done' && c.generated);
  if (doneChapters.length === 0) { showToast('Keine fertigen Kapitel vorhanden.', 'error'); return; }

  const { Document, Packer, Paragraph, TextRun, AlignmentType, HeadingLevel, PageBreak,
          Header, Footer, BorderStyle, ShadingType, TabStopPosition, TabStopType,
          convertInchesToTwip } = docx;

  // BERENT.AI Colors
  const BRAND_GOLD = 'B5742A';
  const BRAND_GOLD_LIGHT = 'E8C98A';
  const BRAND_DARK = '1A1410';
  const TEXT_DEFAULT = '2A2018';
  const TEXT_MUTED = '7A6A58';
  const BOX_BG = 'FDF8F3';
  const SEPARATOR = 'D4C4B0';

  // Build chapter sections
  const children = [];

  // ── Title Page ──
  children.push(
    new Paragraph({ spacing: { before: 3000 } }),
    new Paragraph({
      alignment: AlignmentType.CENTER,
      children: [new TextRun({ text: '+', font: 'Arial', size: 120, color: BRAND_GOLD_LIGHT, bold: false })]
    }),
    new Paragraph({ spacing: { before: 400 } }),
    new Paragraph({
      alignment: AlignmentType.CENTER,
      children: [new TextRun({ text: bookTitle, font: 'Arial', size: 56, color: BRAND_GOLD, bold: true })]
    })
  );

  if (bookSubtitle) {
    children.push(
      new Paragraph({ spacing: { before: 200 } }),
      new Paragraph({
        alignment: AlignmentType.CENTER,
        children: [new TextRun({ text: bookSubtitle, font: 'Arial', size: 28, color: TEXT_MUTED, italics: true })]
      })
    );
  }

  children.push(new Paragraph({ spacing: { before: 600 } }));

  if (bookAuthor) {
    children.push(
      new Paragraph({
        alignment: AlignmentType.CENTER,
        children: [new TextRun({ text: bookAuthor, font: 'Arial', size: 24, color: TEXT_DEFAULT })]
      })
    );
  }

  const today = new Date().toLocaleDateString('de-DE', { year: 'numeric', month: 'long' });
  children.push(
    new Paragraph({ spacing: { before: 200 } }),
    new Paragraph({
      alignment: AlignmentType.CENTER,
      children: [new TextRun({ text: today, font: 'Arial', size: 20, color: TEXT_MUTED })]
    }),
    new Paragraph({ children: [new PageBreak()] })
  );

  // ── Chapters ──
  doneChapters.forEach((chapter, index) => {
    const chapterNum = index + 1;

    // Chapter separator (not before first chapter)
    if (index > 0) {
      children.push(new Paragraph({ children: [new PageBreak()] }));
    }

    // H1 - Chapter Title
    children.push(
      new Paragraph({
        spacing: { before: 400, after: 100 },
        border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: BRAND_GOLD, space: 6 } },
        children: [
          new TextRun({ text: `${chapterNum}  `, font: 'Arial', size: 34, color: BRAND_GOLD, bold: true }),
          new TextRun({ text: chapter.title, font: 'Arial', size: 34, color: BRAND_GOLD, bold: true })
        ]
      }),
      new Paragraph({ spacing: { before: 200 } })
    );

    // Parse chapter content (markdown to docx)
    const lines = chapter.generated.split('\n');
    let i = 0;

    while (i < lines.length) {
      const line = lines[i].trimEnd();

      // Skip empty lines
      if (line.trim() === '') {
        i++;
        continue;
      }

      // H2
      if (line.startsWith('## ')) {
        const heading = line.replace(/^## /, '').replace(/\*\*/g, '');
        children.push(
          new Paragraph({ spacing: { before: 300 } }),
          new Paragraph({
            spacing: { before: 100, after: 80 },
            children: [
              new TextRun({ text: '+  ', font: 'Arial', size: 24, color: BRAND_GOLD_LIGHT, bold: true }),
              new TextRun({ text: heading, font: 'Arial', size: 24, color: BRAND_DARK, bold: true })
            ]
          })
        );
        i++;
        continue;
      }

      // H3
      if (line.startsWith('### ')) {
        const heading = line.replace(/^### /, '').replace(/\*\*/g, '');
        children.push(
          new Paragraph({ spacing: { before: 200 } }),
          new Paragraph({
            spacing: { before: 80, after: 60 },
            children: [
              new TextRun({ text: heading, font: 'Arial', size: 22, color: BRAND_GOLD, bold: true })
            ]
          })
        );
        i++;
        continue;
      }

      // Regular paragraph - collect lines until empty line or heading
      let paragraphText = '';
      while (i < lines.length && lines[i].trim() !== '' && !lines[i].startsWith('#')) {
        if (paragraphText) paragraphText += ' ';
        paragraphText += lines[i].trim();
        i++;
      }

      if (paragraphText) {
        // Parse inline formatting (bold and italic)
        const runs = parseInlineFormatting(paragraphText, TEXT_DEFAULT);
        children.push(
          new Paragraph({
            alignment: AlignmentType.JUSTIFIED,
            spacing: { after: 120, line: 336 },
            children: runs
          })
        );
      }

      if (i < lines.length && lines[i].trim() === '') i++;
    }
  });

  function parseInlineFormatting(text, defaultColor) {
    const runs = [];
    const regex = /(\*\*\*(.+?)\*\*\*|\*\*(.+?)\*\*|\*(.+?)\*)/g;
    let lastIndex = 0;
    let match;

    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIndex) {
        runs.push(new TextRun({
          text: text.slice(lastIndex, match.index),
          font: 'Arial', size: 21, color: defaultColor
        }));
      }

      if (match[2]) {
        // bold + italic
        runs.push(new TextRun({
          text: match[2], font: 'Arial', size: 21, color: defaultColor, bold: true, italics: true
        }));
      } else if (match[3]) {
        // bold
        runs.push(new TextRun({
          text: match[3], font: 'Arial', size: 21, color: defaultColor, bold: true
        }));
      } else if (match[4]) {
        // italic
        runs.push(new TextRun({
          text: match[4], font: 'Arial', size: 21, color: defaultColor, italics: true
        }));
      }

      lastIndex = match.index + match[0].length;
    }

    if (lastIndex < text.length) {
      runs.push(new TextRun({
        text: text.slice(lastIndex),
        font: 'Arial', size: 21, color: defaultColor
      }));
    }

    if (runs.length === 0) {
      runs.push(new TextRun({ text, font: 'Arial', size: 21, color: defaultColor }));
    }

    return runs;
  }

  // ── Create Document ──
  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 11906, height: 16838 },
          margin: { top: 1701, bottom: 1701, left: 1418, right: 1418 }
        }
      },
      footers: {
        default: new Footer({
          children: [
            new Paragraph({
              border: { top: { style: BorderStyle.SINGLE, size: 4, color: SEPARATOR, space: 6 } },
              alignment: AlignmentType.LEFT,
              spacing: { before: 120 },
              children: [
                new TextRun({ text: '+  ', font: 'Arial', size: 16, color: BRAND_GOLD_LIGHT }),
                new TextRun({ text: 'BERENT.AI', font: 'Arial', size: 16, color: TEXT_MUTED })
              ]
            })
          ]
        })
      },
      children
    }]
  });

  // ── Save ──
  const blob = await Packer.toBlob(doc);
  const filename = bookTitle.replace(/[^a-zA-Z0-9äöüÄÖÜß ]/g, '').replace(/\s+/g, '_') + '.docx';
  saveAs(blob, filename);
  showToast('Buch wurde heruntergeladen!', 'success');

  // Nach Download zurücksetzen
  resetApp();
  } catch (err) {
    console.error('DOCX-Fehler:', err);
    showToast('Fehler beim Erstellen der DOCX: ' + err.message, 'error');
  }
}

// ── Reset ──
function resetApp() {
  chapters = [];
  renderChapters();

  document.getElementById('bookTitle').value = '';
  document.getElementById('bookSubtitle').value = '';
  // Autor bleibt erhalten
  document.getElementById('apiKey').value && null; // API Key bleibt erhalten

  document.getElementById('generateBtn').disabled = false;
  document.getElementById('downloadBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('progressSection').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = 'Bereit';
}

// ── Toast ──
function showToast(message, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}
